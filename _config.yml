# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Sneha Sengupta's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Sneha Sengupta
headline: Biomedical Engineer
description: >- # dont remove this line. this will ignore all new lines until the next section
  I am a Biomedical Engineering master's student pursuing a 4+1 Master of Engineering (MEng) at 
  Duke University, with a strong interest in the collaboration of how engineering, data and medicine come together to improve 
  patient care. Outside of the classroom, I’ve gained hands-on experience in both research and clinical settings, including 
  working in biomaterials and medical device design labs, conducting computational modeling and pharmacokinetics studies, and 
  completing clinical research.

# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: /assets/images/Headshot.JPG


# Link your resume
